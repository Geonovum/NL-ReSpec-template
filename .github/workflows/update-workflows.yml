name: Update workflows in document repos

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — toon wijzigingen maar commit niet'
        type: boolean
        default: false

jobs:
  update:
    name: ${{ matrix.org }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        org: [Geonovum, BROprogramma]

    steps:
      - uses: actions/checkout@v6

      - name: Maak GitHub App token aan voor ${{ matrix.org }}
        id: token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ matrix.org }}

      - name: Update workflows in ${{ matrix.org }} repos
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          ORG: ${{ matrix.org }}
          DRY_RUN: ${{ inputs.dry_run }}
          TEMPLATE_GITHUB_DIR: ${{ github.workspace }}/.github
        run: |
          set -euo pipefail

          # ── Verzamel repos ──────────────────────────────────────────────
          AUTO_DETECT=$(jq -r --arg org "$ORG" '.[$org].auto_detect // false' .github/repos.json)

          if [[ "$AUTO_DETECT" == "true" ]]; then
            echo "Auto-detecteer repos in $ORG..."
            REPOS=$(
              page=1
              while true; do
                batch=$(gh api "orgs/$ORG/repos?per_page=100&page=$page&type=all" \
                  --jq '.[].name' 2>/dev/null || true)
                [[ -z "$batch" ]] && break
                echo "$batch"
                page=$((page + 1))
              done | sort -u
            )
          else
            REPOS=$(jq -r --arg org "$ORG" '.[$org].repos[] // empty' .github/repos.json)
          fi

          UPDATED=0; SKIPPED=0; FAILED=0
          WOULD_UPDATE=()
          CONFIG_MOVE_PRS=()

          # ── Verwerk elke repo ───────────────────────────────────────────
          while IFS= read -r REPO; do
            [[ -z "$REPO" ]] && continue
            [[ "$REPO" == ".github" ]] && continue
            echo ""
            echo "=== $ORG/$REPO ==="

            HAS_JS_CONFIG=$(gh api "repos/$ORG/$REPO/contents/js/config.js" \
              > /dev/null 2>&1 && echo "true" || echo "false")
            HAS_ROOT_CONFIG=$(gh api "repos/$ORG/$REPO/contents/config.js" \
              > /dev/null 2>&1 && echo "true" || echo "false")

            # ── config.js in root → PR aanmaken om te verplaatsen ──────────
            if [[ "$HAS_ROOT_CONFIG" == "true" && "$HAS_JS_CONFIG" == "false" ]]; then
              echo "📦 config.js gevonden in root, nog niet in js/ — PR aanmaken."

              if [[ "$DRY_RUN" == "true" ]]; then
                CONFIG_MOVE_PRS+=("$ORG/$REPO (config.js → js/config.js)")
              else
                TMP_CFG=$(mktemp -d)
                EXIT_CODE_CFG=0
                (
                  DEFAULT_BRANCH=$(gh repo view "$ORG/$REPO" \
                    --json defaultBranchRef --jq '.defaultBranchRef.name')
                  gh repo clone "$ORG/$REPO" "$TMP_CFG" -- --depth=1 --quiet \
                    --branch "$DEFAULT_BRANCH"
                  cd "$TMP_CFG"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git config user.name "github-actions[bot]"

                  MOVE_BRANCH="chore/verplaats-config-js-naar-js-map"
                  git checkout -b "$MOVE_BRANCH"

                  mkdir -p js
                  git mv config.js js/config.js
                  git commit -m "chore: verplaats config.js naar js/config.js"
                  git push origin "$MOVE_BRANCH" --force

                  EXISTING=$(gh pr list \
                    --repo "$ORG/$REPO" \
                    --head "$MOVE_BRANCH" \
                    --state open \
                    --json number \
                    --jq '.[0].number' 2>/dev/null || true)

                  if [[ -n "$EXISTING" ]]; then
                    echo "🔄 PR #$EXISTING al aanwezig."
                  else
                    gh pr create \
                      --repo "$ORG/$REPO" \
                      --title "chore: verplaats config.js naar js/config.js" \
                      --body "De \`config.js\` staat nu in de root van het project. Deze PR verplaatst het bestand naar \`js/config.js\` conform de NL-ReSpec-template structuur." \
                      --base "$DEFAULT_BRANCH" \
                      --head "$MOVE_BRANCH"
                    echo "✅ PR aangemaakt voor config.js verplaatsing."
                  fi
                ) || EXIT_CODE_CFG=$?
                rm -rf "$TMP_CFG"
                [[ $EXIT_CODE_CFG -ne 0 ]] && { echo "❌ Fout bij config.js PR voor $ORG/$REPO"; FAILED=$((FAILED + 1)); }
              fi

              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            if [[ "$HAS_JS_CONFIG" == "false" ]]; then
              echo "⏩ Geen js/config.js of config.js aanwezig, overslaan."
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            TMP=$(mktemp -d)

            EXIT_CODE=0
            (
              DEFAULT_BRANCH=$(gh repo view "$ORG/$REPO" \
                --json defaultBranchRef --jq '.defaultBranchRef.name')

              gh repo clone "$ORG/$REPO" "$TMP" -- --depth=1 --quiet \
                --branch "$DEFAULT_BRANCH"

              cd "$TMP"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git config user.name "github-actions[bot]"

              rm -rf .github
              cp -r "$TEMPLATE_GITHUB_DIR" .github
              find .github -name '.DS_Store' -delete
              # Verwijder bestanden die alleen in de template thuishoren
              rm -f .github/workflows/update-workflows.yml
              rm -f .github/repos.json

              if git diff --quiet && git diff --staged --quiet; then
                echo "✅ Geen wijzigingen."
                exit 0
              fi

              git add .github

              if [[ "$DRY_RUN" == "true" ]]; then
                echo "🔍 Dry run — gewijzigde bestanden:"
                git diff --staged --name-only
                exit 2
              fi

              git commit -m "chore: update GitHub Actions workflows vanuit NL-ReSpec-template"
              git push origin "$DEFAULT_BRANCH"
              echo "✅ Gecommit op $DEFAULT_BRANCH."
            ) || EXIT_CODE=$?

            case $EXIT_CODE in
              0) UPDATED=$((UPDATED + 1)) ;;
              2) WOULD_UPDATE+=("$ORG/$REPO") ;;
              *) echo "❌ Fout bij $ORG/$REPO"; FAILED=$((FAILED + 1)) ;;
            esac

            rm -rf "$TMP"
          done <<< "$REPOS"

          echo ""
          echo "════════════════════════════════════════"
          echo "Samenvatting $ORG"
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "  Zou bijwerken (.github): ${#WOULD_UPDATE[@]}"
            for r in "${WOULD_UPDATE[@]}"; do echo "    - $r"; done
            echo "  Zou PR aanmaken (config.js): ${#CONFIG_MOVE_PRS[@]}"
            for r in "${CONFIG_MOVE_PRS[@]}"; do echo "    - $r"; done
          else
            echo "  Bijgewerkt:   $UPDATED"
          fi
          echo "  Overgeslagen: $SKIPPED"
          echo "  Mislukt:      $FAILED"
          echo "════════════════════════════════════════"

          [[ $FAILED -eq 0 ]] || exit 1
